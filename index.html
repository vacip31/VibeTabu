<!DOCTYPE html>
<html class="dark" lang="tr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
    <title>VibeParty - Grup Oyunları Portalı 🎯</title>

    <!-- Favicon & PWA Manifest -->
    <link rel="icon" type="image/png" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <link rel="manifest" href="./manifest.json" />

    <!-- Yerel Font & Material Simgeleri (Çevrimdışı Çalışma Desteği) -->
    <link rel="stylesheet" href="./css/fonts.css" />

    <!-- Derlenmiş Yerel Tailwind CSS -->
    <link rel="stylesheet" href="./css/tailwind-hub.css" />

    <!-- Özel Tasarım Sistemimiz (Obsidian Glass) -->
    <link rel="stylesheet" href="./css/styles.css" />
    
    <!-- Portal Özel Stil Aşımı -->
    <style>
        :root {
            --color-background: #0b0f19;
            --color-surface: #161e31;
            --color-primary: #00f2fe;
            --color-neon-purple: #ff7a00;
            --color-soft-emerald: #00f2fe;
            --color-midnight-blue: #161e31;
            --color-coral-red: #ff7a00;
            --color-outline: rgba(255, 255, 255, 0.05);
        }
        /* Portal İçin Üç Renkli Kozmik Neon Nebula Glow */
        .glow-bg {
            background: radial-gradient(circle at 20% 30%, rgba(0, 242, 254, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 30%, rgba(255, 122, 0, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 50% 80%, rgba(139, 92, 246, 0.12) 0%, transparent 60%) !important;
            filter: blur(60px) !important;
        }
        .ambient-glow {
            background: radial-gradient(circle, rgba(139, 92, 246, 0.06) 0%, rgba(0,0,0,0) 70%) !important;
        }
    </style>
</head>

<body
    class="bg-background text-on-surface antialiased h-screen w-screen overflow-hidden flex flex-col font-body relative">

    <!-- Atmosferik Arka Plan Işıması -->
    <div class="glow-bg opacity-80"></div>
    <div class="ambient-glow opacity-50 animate-pulse-slow"></div>

    <main
        class="flex-1 flex flex-col items-center justify-between w-full max-w-[600px] mx-auto px-container-padding py-12 relative z-10 text-center">

        <!-- Üst Başlık & Marka -->
        <div class="flex flex-col items-center mt-4 animate-float">
            <!-- PWA Logo Çerçevesi (Mor & Mavi Çift Halka Gölgeli) -->
            <div
                class="relative w-20 h-20 mb-5 flex items-center justify-center rounded-[24px] bg-[#161e31]/45 border border-white/10 shadow-[0_8px_32px_rgba(139,92,246,0.15),_0_0_16px_rgba(0,242,254,0.1)] overflow-hidden">
                <img src="./icon-192.png" alt="VibeParty Logo" class="w-[60px] h-[60px] object-contain rounded-[14px]">
            </div>

            <h1
                class="font-display text-[40px] font-extralight tracking-[0.25em] text-white drop-shadow-[0_0_30px_rgba(139,92,246,0.25)]">
                VİBE<span class="text-transparent bg-clip-text bg-gradient-to-r from-[#00f2fe] via-[#d946ef] to-[#ff7a00] font-semibold">PARTY</span>
            </h1>
            <p class="font-body text-[10px] text-white/30 tracking-[0.2em] mt-3 uppercase">Grup Oyunları Portalı</p>
        </div>

        <!-- Oyun Seçim Menüsü -->
        <div class="w-full flex flex-col gap-4 my-auto max-w-[360px] mx-auto">

            <!-- VibeTabu Kartı (Turkuaz Işıma & İndigo Detaylar) -->
            <a href="./games/taboo/index.html"
                class="glass-panel rounded-2xl p-5 flex items-center justify-between shadow-lg border border-primary/20 hover:border-primary/40 bg-primary/[0.01] active:scale-98 transition-all group relative overflow-hidden text-left">
                <div
                    class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-primary/30 to-transparent">
                </div>
                <div class="flex items-center gap-4 min-w-0">
                    <div
                        class="w-12 h-12 rounded-xl flex items-center justify-center border border-primary/20 bg-primary/10 text-primary shadow-[0_0_12px_rgba(0,242,254,0.2)] shrink-0">
                        <span class="material-symbols-outlined text-2xl">casino</span>
                    </div>
                    <div class="flex flex-col gap-0.5 min-w-0">
                        <h2
                            class="font-display text-base text-white font-medium group-hover:text-primary transition-colors">
                            VibeTabu</h2>
                        <p class="font-body text-xs text-white/50 font-light truncate sm:text-wrap">Yasak kelimelere
                            basmadan anlat!</p>
                    </div>
                </div>
                <div class="flex items-center gap-1 shrink-0 ml-2">
                    <span
                        class="px-2 py-0.5 rounded-full border border-violet-500/30 bg-violet-600/10 text-violet-400 text-[8px] tracking-wider uppercase font-semibold whitespace-nowrap">Aktif
                        🎮</span>
                </div>
            </a>

            <!-- Vibe X Verses (Turuncu Işıma & Fuşya Detaylar) -->
            <a href="./games/verses/index.html"
                class="glass-panel rounded-2xl p-5 flex items-center justify-between shadow-lg border border-secondary/20 hover:border-secondary/40 bg-secondary/[0.01] active:scale-98 transition-all group relative overflow-hidden text-left">
                <div
                    class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-secondary/30 to-transparent">
                </div>
                <div class="flex items-center gap-4 min-w-0">
                    <div
                        class="w-12 h-12 rounded-xl flex items-center justify-center border border-secondary/20 bg-secondary/10 text-secondary shadow-[0_0_12px_rgba(255,122,0,0.2)] shrink-0">
                        <span class="material-symbols-outlined text-2xl">history_edu</span>
                    </div>
                    <div class="flex flex-col gap-0.5 min-w-0">
                        <h2
                            class="font-display text-base text-white font-medium group-hover:text-secondary transition-colors">
                            Vibe X Verses</h2>
                        <p class="font-body text-xs text-white/50 font-light leading-relaxed">Gizli casus olarak sız
                            veya ekibinle kopmayan bir ipucu zinciri oluştur!</p>
                    </div>
                </div>
                <div class="flex items-center gap-1 shrink-0 ml-2">
                    <span
                        class="px-2 py-0.5 rounded-full border border-fuchsia-500/30 bg-fuchsia-600/10 text-fuchsia-400 text-[8px] tracking-wider uppercase font-semibold whitespace-nowrap">Aktif
                        🖋️</span>
                </div>
            </a>

            <!-- Karar Ruleti (Kilitli - Mor/Lila Vurgulu) -->
            <div
                class="glass-panel rounded-2xl p-5 flex items-center justify-between shadow-md border border-violet-500/10 bg-violet-950/[0.02] opacity-50 text-left cursor-not-allowed select-none relative overflow-hidden">
                <div class="flex items-center gap-4 min-w-0">
                    <div
                        class="w-12 h-12 rounded-xl flex items-center justify-center border border-violet-500/20 bg-violet-500/10 text-violet-400 shrink-0 shadow-[0_0_12px_rgba(139,92,246,0.1)]">
                        <span class="material-symbols-outlined text-2xl">track_changes</span>
                    </div>
                    <div class="flex flex-col gap-0.5 min-w-0">
                        <h2 class="font-display text-base text-violet-300/80 font-medium">Kader Ruleti</h2>
                        <p class="font-body text-xs text-white/40 font-light">Çok Yakında...</p>
                    </div>
                </div>
                <span class="material-symbols-outlined text-violet-400/50 text-lg shrink-0 ml-2">lock</span>
            </div>

        </div>

        <!-- Footer -->
        <div class="w-full relative z-10 pb-4">
            <p class="font-body text-[10px] text-white/20 tracking-[0.15em] uppercase">vacbir-VibeParty Portal • v1.0.0
            </p>
        </div>

    </main>

    <!-- Portal JavaScript Dosyası (Service Worker Kaydı vb.) -->
    <script type="module" src="./js/hub.js"></script>
</body>

</html>
